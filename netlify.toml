[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/dashboard_data.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
